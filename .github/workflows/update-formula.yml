name: Update Atopile Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update to (e.g. 0.1.0)'
        required: false
        type: string

jobs:
  update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.4"

      - name: Update formula
        env:
          TARGET_VERSION: ${{ inputs.version }}
        run: uv run scripts/update_atopile_formula.py

      - name: Create branch and commit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b "v${{ inputs.version }}"
          git add Formula/atopile.rb
          git commit -m "atopile ${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          gh pr create \
            --title "atopile ${{ inputs.version }}" \
            --body "This PR updates the \`atopile\` formula to version ${{ inputs.version }}.

            This update was automatically triggered by the release workflow." \
            --base main \
            --head "v${{ inputs.version }}"
